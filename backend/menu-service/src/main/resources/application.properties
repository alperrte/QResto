spring.application.name=menu-service

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Ürün görselleri (kalıcı disk; Docker’da volume ile eşleştirin)
qresto.menu.product-images-dir=./data/menu-product-images

server.port=${SERVER_PORT_MENU}
spring.datasource.url=jdbc:sqlserver://${DB_HOST}:${DB_PORT};databaseName=${DB_NAME};encrypt=true;trustServerCertificate=true
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

spring.flyway.enabled=true
spring.flyway.schemas=menu
spring.flyway.default-schema=menu  
spring.flyway.create-schemas=true
spring.flyway.locations=classpath:db/migration
