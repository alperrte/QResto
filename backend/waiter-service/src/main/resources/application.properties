spring.application.name=waiter-service
server.port=${SERVER_PORT_WAITER}

spring.datasource.url=jdbc:sqlserver://${DB_HOST}:${DB_PORT};databaseName=${DB_NAME};encrypt=true;trustServerCertificate=true
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

spring.flyway.enabled=true
spring.flyway.schemas=waiter
spring.flyway.default-schema=waiter
spring.flyway.create-schemas=true
spring.flyway.locations=classpath:db/migration

jwt.secret=${JWT_SECRET}

auth.service.url=${AUTH_SERVICE_URL}
qr.service.url=${QR_SERVICE_URL}
kitchen.service.url=${KITCHEN_SERVICE_URL}