version: "3.9"

services:
  mssql:
    platform: linux/amd64
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ${MSSQL_CONTAINER}
    restart: always
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${MSSQL_PORT}:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P ${DB_PASSWORD} -C -Q 'SELECT 1'",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  database:
    platform: linux/amd64
    image: mcr.microsoft.com/mssql/server:2022-latest
    depends_on:
      mssql:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-lc"]
    command: >
      "/opt/mssql-tools18/bin/sqlcmd
      -S mssql
      -U sa
      -P \"$DB_PASSWORD\"
      -C
      -Q \"IF DB_ID('${DB_NAME}') IS NULL CREATE DATABASE ${DB_NAME};\""
    environment:
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
    restart: "no"

  auth-service:
    build: ./backend/auth-service
    container_name: qresto-auth
    env_file:
      - .env
    depends_on:
      mssql:
        condition: service_healthy
      database:
        condition: service_completed_successfully
    environment:
      SERVER_PORT: ${SERVER_PORT_AUTH}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      REFRESH_TOKEN_EXPIRATION: ${REFRESH_TOKEN_EXPIRATION}
    ports:
      - "${SERVER_PORT_AUTH}:${SERVER_PORT_AUTH}"
    restart: unless-stopped

  menu-service:
    build: ./backend/menu-service
    container_name: qresto-menu
    env_file:
      - .env
    depends_on:
      mssql:
        condition: service_healthy
      database:
        condition: service_completed_successfully
    environment:
      SERVER_PORT: ${SERVER_PORT_MENU}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${SERVER_PORT_MENU}:${SERVER_PORT_MENU}"
    restart: unless-stopped

  qr-service:
    build: ./backend/qr-service
    container_name: qresto-qr
    env_file:
      - .env
    depends_on:
      mssql:
        condition: service_healthy
      database:
        condition: service_completed_successfully
    environment:
      SERVER_PORT: ${SERVER_PORT_QR}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE}
    ports:
      - "${SERVER_PORT_QR}:${SERVER_PORT_QR}"
    restart: unless-stopped

volumes:
  mssql_data: